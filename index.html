    <style>
      :root {
        --blob-color-1: rgba(218, 105, 39, 1);
        --blob-color-2: rgba(255, 180, 100, 0.8);
        --blob-scale: 1;
        --blob-opacity-base: 0.35;
      }
        body {
            font-family: 'Inter', sans-serif;
            color: #2E3D45;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }
        h1, h2, h3, h4, .font-montserrat {
            font-family: 'Montserrat', sans-serif;
        }
        .bg-glass {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(10px);
        }
        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .no-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }

        /* Animated Blobs */
        @keyframes blob-morph {
            0%, 100% { border-radius: 42% 58% 70% 30% / 45% 45% 55% 55%; }
            25% { border-radius: 73% 27% 26% 74% / 67% 29% 71% 33%; }
            50% { border-radius: 34% 66% 51% 49% / 57% 42% 58% 43%; }
            75% { border-radius: 67% 33% 47% 53% / 37% 58% 42% 63%; }
        }

        @keyframes blob-move {
            0%, 100% { transform: translate(0, 0) rotate(0deg); }
            33% { transform: translate(30px, -50px) rotate(120deg); }
            66% { transform: translate(-20px, 20px) rotate(240deg); }
        }

        .animate-blob-morph {
            animation: blob-morph 25s ease-in-out infinite;
        }

        .animate-blob-move {
            animation: blob-move 35s ease-in-out infinite;
        }
    </style>
